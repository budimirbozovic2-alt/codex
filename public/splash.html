<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <!-- PR-H-OPFS-FIX-2: Google Fonts removed (COEP require-corp blocked gstatic).
       Splash uses system fonts; main window still uses self-hosted DM Sans/Fraunces. -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 480px;
      height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse at 30% 20%, hsl(220 30% 16%) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 90%, hsl(220 40% 10%) 0%, transparent 60%),
        linear-gradient(135deg, hsl(220 40% 9%) 0%, hsl(220 45% 6%) 100%);
      border-radius: 18px;
      overflow: hidden;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      color: hsl(220 20% 88%);
      -webkit-app-region: drag;
      position: relative;
    }
    body::after {
      content: "";
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, hsl(220 50% 4% / 0.6) 100%);
      pointer-events: none;
    }
    .container {
      text-align: center;
      animation: fadeIn 0.7s cubic-bezier(0.22, 0.61, 0.36, 1);
      position: relative; z-index: 1;
    }
    .mark {
      width: 84px;
      height: 84px;
      margin: 0 auto 28px;
      position: relative;
      animation: floatY 3.2s ease-in-out infinite;
    }
    .mark svg, .mark img { width: 100%; height: 100%; display: block; object-fit: contain; border-radius: 18px; }
    .ring {
      position: absolute; inset: -6px;
      border-radius: 50%;
      box-shadow:
        0 0 0 1px hsl(45 60% 60% / 0.18),
        0 8px 40px hsl(45 70% 55% / 0.18);
      animation: glow 2.4s ease-in-out infinite;
    }
    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 32px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      background: linear-gradient(180deg, hsl(45 70% 78%) 0%, hsl(45 55% 55%) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 11px;
      color: hsl(220 15% 55%);
      margin-bottom: 32px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .pulse-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      margin: 0 auto;
      background: hsl(45 70% 60%);
      box-shadow: 0 0 12px hsl(45 70% 60% / 0.7);
      animation: pulseDot 1.4s ease-in-out infinite;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes floatY {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-3px); }
    }
    @keyframes glow {
      0%, 100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }
    @keyframes pulseDot {
      0%, 100% { opacity: 0.4; transform: scale(0.9); }
      50%      { opacity: 1;   transform: scale(1.15); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="mark">
      <div class="ring"></div>
      <img src="app-logo.png" alt="CODEX" />
    </div>
    <h1>CODEX</h1>
    <p>Pravosudni sistem</p>
    <div class="pulse-dot"></div>
  </div>
</body>
</html>
