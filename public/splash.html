<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 480px;
      height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse at 30% 20%, hsl(220 30% 16%) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 90%, hsl(220 40% 10%) 0%, transparent 60%),
        linear-gradient(135deg, hsl(220 40% 9%) 0%, hsl(220 45% 6%) 100%);
      border-radius: 18px;
      overflow: hidden;
      font-family: 'DM Sans', system-ui, sans-serif;
      color: hsl(220 20% 88%);
      -webkit-app-region: drag;
      position: relative;
    }
    body::after {
      content: "";
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, hsl(220 50% 4% / 0.6) 100%);
      pointer-events: none;
    }
    .container {
      text-align: center;
      animation: fadeIn 0.7s cubic-bezier(0.22, 0.61, 0.36, 1);
      position: relative; z-index: 1;
    }
    .mark {
      width: 84px;
      height: 84px;
      margin: 0 auto 28px;
      position: relative;
      animation: floatY 3.2s ease-in-out infinite;
    }
    .mark svg { width: 100%; height: 100%; display: block; }
    .ring {
      position: absolute; inset: -6px;
      border-radius: 50%;
      box-shadow:
        0 0 0 1px hsl(45 60% 60% / 0.18),
        0 8px 40px hsl(45 70% 55% / 0.18);
      animation: glow 2.4s ease-in-out infinite;
    }
    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 32px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      background: linear-gradient(180deg, hsl(45 70% 78%) 0%, hsl(45 55% 55%) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 11px;
      color: hsl(220 15% 55%);
      margin-bottom: 32px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .pulse-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      margin: 0 auto;
      background: hsl(45 70% 60%);
      box-shadow: 0 0 12px hsl(45 70% 60% / 0.7);
      animation: pulseDot 1.4s ease-in-out infinite;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes floatY {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-3px); }
    }
    @keyframes glow {
      0%, 100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }
    @keyframes pulseDot {
      0%, 100% { opacity: 0.4; transform: scale(0.9); }
      50%      { opacity: 1;   transform: scale(1.15); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="mark">
      <div class="ring"></div>
      <svg viewBox="0 0 84 84" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="42" cy="42" r="38" stroke="hsl(45 60% 55%)" stroke-width="1.2" opacity="0.45"/>
        <path d="M28 30 L28 54 L42 60 L56 54 L56 30 L42 24 Z"
              stroke="hsl(45 70% 65%)" stroke-width="1.6" stroke-linejoin="round" fill="none"/>
        <path d="M42 24 L42 60 M28 30 L56 54 M56 30 L28 54"
              stroke="hsl(45 55% 50%)" stroke-width="0.8" opacity="0.55"/>
        <circle cx="42" cy="42" r="3.2" fill="hsl(45 75% 65%)"/>
      </svg>
    </div>
    <h1>CODEX</h1>
    <p>Pravosudni sistem</p>
    <div class="pulse-dot"></div>
  </div>
</body>
</html>
