<p></p>
<p><strong>Pojam podnesaka</strong></p>
<p>Član 59</p>
<p>Podnesci su zahtjevi, prijedlozi, prijave i druga saopštenja kojima se stranke obraćaju organima. Oni se mogu podnositi u pisanom obliku ili usmeno na zapisnik kod organa.</p>
<p></p>
<p><strong>Neuredan podnesak</strong></p>
<p>Član 60</p>
<p>Ako podnesak sadrži neki formalni nedostatak koji sprečava postupanje po podnesku, ili je nerazumljiv ili nepotpun, organ koji je primio takav podnesak pomoći će podnosiocu da nedostatak otkloni, tako što će ga pozvati da u određenom roku ispravi podnesak.</p>
<p></p>
<p><strong>Predaja podnesaka</strong></p>
<p>Član 61</p>
<p>Podnesci se predaju neposredno organu ili se šalju poštom. Podnesci se mogu podnositi i u obliku elektronskog dokumenta u skladu sa zakonom kojim se uređuje elektronski dokument.</p>
<p></p>

<p>Član 62</p>
