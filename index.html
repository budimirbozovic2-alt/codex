<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' app:; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' app:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: app:; font-src 'self' data: app:; connect-src 'self' blob: app: ws: wss:; media-src 'self' blob: app:; object-src 'none'; base-uri 'self';"
    />
    <title>CODEX — Sistem za memorizaciju</title>
    <meta
      name="description"
      content="Aplikacija za učenje esejskih pitanja"
    />
    <link
      rel="icon"
      href="./favicon.png"
      type="image/png"
    />
    
    <style>
      @keyframes appSplashFade {
        from { 
          opacity: 0; 
          transform: translateY(12px); 
        }
        to { 
          opacity: 1; 
          transform: translateY(0); 
        }
      }
      @keyframes splashPulse {
        0%, 100% {
          transform: scale(1);
          box-shadow: 0 8px 32px rgba(56, 130, 220, 0.35);
        }
        50% {
          transform: scale(1.08);
          box-shadow: 0 12px 40px rgba(56, 130, 220, 0.5);
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <div
      id="app-splash"
      style="
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          ellipse at center, #152238 0%, #0a1628 100%
        );
        font-family: 'Segoe UI', sans-serif;
        color: #e0e0e0;
        transition: opacity 0.4s ease-out;
      "
    >
      <div
        style="
          text-align: center; 
          animation: appSplashFade 0.5s ease-out;
        "
      >
        <div
          style="
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(56, 130, 220, 0.35);
            animation: splashPulse 1.8s infinite;
            overflow: hidden;
          "
        >
          <img
            src="./logo-icon.png"
            alt="CODEX"
            style="width:100%;height:100%;object-fit:cover;"
          />
        </div>
        <h1
          style="
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.25em;
            margin-bottom: 4px;
            background: linear-gradient(
              90deg, #a0c4f0, #3882dc
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
          "
        >CODEX</h1>
        <p
          style="
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 16px;
          "
        >
          Pravosudni Sistem
        </p>
        <p
          id="splash-status"
          style="
            font-size: 11px; 
            color: #9ca3af; 
            margin-bottom: 12px; 
            min-height: 16px;
          "
        >
          Pokretanje…
        </p>
        <div
          style="
            width: 200px;
            height: 4px;
            margin: 0 auto;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            overflow: hidden;
          "
        >
          <div
            id="splash-progress"
            style="
              width: 0%;
              height: 100%;
              background: linear-gradient(
                90deg, #3882dc, #5ba0f5
              );
              border-radius: 3px;
              transition: width 0.3s ease-out;
            "
          ></div>
        </div>
        <p
          id="splash-percent"
          style="font-size: 10px; color: #6b7280; margin-top: 6px;"
        >
          0%
        </p>
        <p
          id="splash-phase"
          style="
            font-size: 9px; 
            color: #4b5563; 
            margin-top: 4px; 
            font-family: monospace; 
            min-height: 14px;
          "
        ></p>
      </div>
    </div>

    <div
      id="boot-fallback"
      style="
        display: none;
        position: fixed;
        inset: 0;
        z-index: 10000;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          ellipse at center, #152238 0%, #0a1628 100%
        );
        font-family: 'Segoe UI', sans-serif;
        color: #e0e0e0;
      "
    >
      <div
        style="
          text-align: center;
          max-width: 420px;
          padding: 32px;
        "
      >
        <div
          style="
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(56,130,220,0.1);
            border: 1px solid rgba(56,130,220,0.25);
          "
        >
          <span style="font-size: 28px;">⏳</span>
        </div>
        <h1 style="font-size: 18px; font-weight: 700;">CODEX</h1>
        <p style="font-size: 14px; color: #d1d5db;">
          Aplikacija se učitava duže nego što je očekivano.
        </p>
        <button
          onclick="window.location.reload()"
          style="padding: 10px 28px; cursor: pointer;"
        >
          Osveži aplikaciju
        </button>
      </div>
    </div>

    <script>
      (function(){
        var IS_ELECTRON = typeof window !== "undefined" &&
          !!window.electronAPI;
        var TIMEOUT = IS_ELECTRON ? 8000 : 20000;
        var MAX_RETRIES = IS_ELECTRON ? 1 : 2;
        var RETRY_KEY = "__codex_boot_retries";
        var retries = parseInt(
          sessionStorage.getItem(RETRY_KEY) || "0", 10
        );

        var t = setTimeout(function(){
          var root = document.getElementById("root");
          var appMounted = (window.__codexAppMounted === true) ||
            (root && root.querySelector("[data-app-mounted]"));
          if (appMounted) {
            sessionStorage.removeItem(RETRY_KEY);
            return;
          }

          if (retries < MAX_RETRIES) {
            sessionStorage.setItem(RETRY_KEY, String(retries + 1));
            window.location.reload();
          } else {
            sessionStorage.removeItem(RETRY_KEY);
            var splash = document.getElementById("app-splash");
            var fallback = document.getElementById("boot-fallback");
            if (splash) {
              splash.style.transition = "opacity 0.3s";
              splash.style.opacity = "0";
              setTimeout(function(){
                if (splash.parentNode) splash.remove();
              }, 400);
            }
            if (fallback) fallback.style.display = "flex";
          }
        }, TIMEOUT);
        window.__codexSplashTimer = t;
      })();
    </script>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
