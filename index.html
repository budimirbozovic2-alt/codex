<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' app:; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' app:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: app:; font-src 'self' data: app:; connect-src 'self' blob: app: ws: wss:; media-src 'self' blob: app:; object-src 'none'; base-uri 'self';"
    />
    <title>CODEX — Sistem za memorizaciju</title>
    <meta
      name="description"
      content="Aplikacija za učenje esejskih pitanja"
    />
    <link
      rel="icon"
      href="./favicon.png"
      type="image/png"
    />
    
    <style>
      @keyframes appSplashFade {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes appSplashFloat {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-3px); }
      }
      @keyframes appSplashGlow {
        0%, 100% { opacity: 0.5; }
        50%      { opacity: 1; }
      }
      @keyframes appSplashPulse {
        0%, 100% { opacity: 0.4; transform: scale(0.9); }
        50%      { opacity: 1;   transform: scale(1.15); }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <div
      id="app-splash"
      style="
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(ellipse at 30% 20%, hsl(220 30% 16%) 0%, transparent 55%),
          radial-gradient(ellipse at 80% 90%, hsl(220 40% 10%) 0%, transparent 60%),
          linear-gradient(135deg, hsl(220 40% 9%) 0%, hsl(220 45% 6%) 100%);
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        color: hsl(220 20% 88%);
        transition: opacity 0.4s ease-out;
      "
    >
      <!-- vignette overlay -->
      <div style="
        position: absolute; inset: 0; pointer-events: none;
        background: radial-gradient(ellipse at center, transparent 40%, hsl(220 50% 4% / 0.6) 100%);
      "></div>

      <div
        style="
          text-align: center;
          animation: appSplashFade 0.7s cubic-bezier(0.22, 0.61, 0.36, 1);
          position: relative; z-index: 1;
        "
      >
        <!-- logo mark with floating animation + glow ring -->
        <div style="
          width: 84px; height: 84px;
          margin: 0 auto 28px;
          position: relative;
          animation: appSplashFloat 3.2s ease-in-out infinite;
        ">
          <div style="
            position: absolute; inset: -6px;
            border-radius: 50%;
            box-shadow:
              0 0 0 1px hsl(45 60% 60% / 0.18),
              0 8px 40px hsl(45 70% 55% / 0.18);
            animation: appSplashGlow 2.4s ease-in-out infinite;
          "></div>
          <img
            src="./app-logo.png"
            alt="CODEX"
            style="width:100%;height:100%;display:block;object-fit:contain;border-radius:18px;"
          />
        </div>

        <h1 style="
          font-family: Georgia, 'Times New Roman', serif;
          font-size: 32px;
          font-weight: 500;
          letter-spacing: -0.02em;
          margin-bottom: 8px;
          background: linear-gradient(180deg, hsl(45 70% 78%) 0%, hsl(45 55% 55%) 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        ">CODEX</h1>

        <p style="
          font-size: 11px;
          color: hsl(220 15% 55%);
          margin-bottom: 28px;
          letter-spacing: 0.22em;
          text-transform: uppercase;
          font-weight: 500;
        ">Pravosudni sistem</p>

        <!-- progress bar -->
        <div style="
          width: 180px; height: 2px;
          margin: 0 auto 10px;
          background: hsl(220 20% 20%);
          border-radius: 2px; overflow: hidden;
        ">
          <div
            id="splash-progress"
            style="
              width: 0%; height: 100%;
              background: linear-gradient(90deg, hsl(45 65% 50%), hsl(45 75% 65%));
              border-radius: 2px;
              transition: width 0.3s ease-out;
            "
          ></div>
        </div>

        <p
          id="splash-status"
          style="
            font-size: 10px;
            color: hsl(220 15% 45%);
            min-height: 14px;
            margin-bottom: 20px;
          "
        >Pokretanje…</p>

        <!-- pulsing dot (replaces percent label) -->
        <div style="
          width: 6px; height: 6px;
          border-radius: 50%;
          margin: 0 auto;
          background: hsl(45 70% 60%);
          box-shadow: 0 0 12px hsl(45 70% 60% / 0.7);
          animation: appSplashPulse 1.4s ease-in-out infinite;
        "></div>

        <!-- hidden elements kept for JS compat -->
        <p id="splash-percent" style="display:none"></p>
        <p id="splash-phase"   style="display:none"></p>
      </div>
    </div>

    <div
      id="boot-fallback"
      style="
        display: none;
        position: fixed;
        inset: 0;
        z-index: 10000;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          ellipse at center, #152238 0%, #0a1628 100%
        );
        font-family: 'Segoe UI', sans-serif;
        color: #e0e0e0;
      "
    >
      <div
        style="
          text-align: center;
          max-width: 420px;
          padding: 32px;
        "
      >
        <div
          style="
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(56,130,220,0.1);
            border: 1px solid rgba(56,130,220,0.25);
          "
        >
          <span style="font-size: 28px;">⏳</span>
        </div>
        <h1 style="font-size: 18px; font-weight: 700;">CODEX</h1>
        <p style="font-size: 14px; color: #d1d5db;">
          Aplikacija se učitava duže nego što je očekivano.
        </p>
        <button
          onclick="window.location.reload()"
          style="padding: 10px 28px; cursor: pointer;"
        >
          Osveži aplikaciju
        </button>
      </div>
    </div>

    <script>
      (function(){
        var IS_ELECTRON = typeof window !== "undefined" &&
          !!window.electronAPI;
        var TIMEOUT = IS_ELECTRON ? 8000 : 20000;
        var MAX_RETRIES = IS_ELECTRON ? 1 : 2;
        var RETRY_KEY = "__codex_boot_retries";
        var retries = parseInt(
          sessionStorage.getItem(RETRY_KEY) || "0", 10
        );

        var t = setTimeout(function(){
          var root = document.getElementById("root");
          var appMounted = (window.__codexAppMounted === true) ||
            (root && root.querySelector("[data-app-mounted]"));
          if (appMounted) {
            sessionStorage.removeItem(RETRY_KEY);
            return;
          }

          if (retries < MAX_RETRIES) {
            sessionStorage.setItem(RETRY_KEY, String(retries + 1));
            window.location.reload();
          } else {
            sessionStorage.removeItem(RETRY_KEY);
            var splash = document.getElementById("app-splash");
            var fallback = document.getElementById("boot-fallback");
            if (splash) {
              splash.style.transition = "opacity 0.3s";
              splash.style.opacity = "0";
              setTimeout(function(){
                if (splash.parentNode) splash.remove();
              }, 400);
            }
            if (fallback) fallback.style.display = "flex";
          }
        }, TIMEOUT);
        window.__codexSplashTimer = t;
      })();
    </script>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
