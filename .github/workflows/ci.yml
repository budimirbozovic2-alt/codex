name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (saves minutes on PR rebases).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: Lint, domain walls, typecheck & tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Skip Husky/Playwright/Electron post-install downloads in CI.
      HUSKY: "0"
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      # ── Bun runtime ───────────────────────────────────────────────────
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # ── ESLint + TypeScript incremental caches ─────────────────────────
      # `.eslintcache` and `.tsbuildinfo` make repeat runs 5–10x faster
      # on unchanged files. Keyed on lockfile + config so any toolchain
      # bump invalidates cleanly.
      - name: Restore lint & typecheck caches
        uses: actions/cache@v4
        with:
          path: |
            .eslintcache
            node_modules/.cache
            **/*.tsbuildinfo
          key: >-
            tooling-${{ runner.os }}-bun-${{ hashFiles('bun.lock',
            'eslint.config.js', 'tsconfig*.json') }}-${{ github.ref_name }}
          restore-keys: |
            tooling-${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'eslint.config.js', 'tsconfig*.json') }}-
            tooling-${{ runner.os }}-bun-

      # ── Bun global install cache ───────────────────────────────────────
      # Bun stores downloaded/extracted packages at ~/.bun/install/cache.
      # Caching it makes `bun install --frozen-lockfile` a near no-op when
      # the lockfile is unchanged. Keyed on bun.lock so any dep change
      # invalidates cleanly; restore-keys allow partial reuse on bumps.
      - name: Restore Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-cache-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── Domain wall guard (W11–W14) — fast grep, runs first ────────────
      - name: Domain walls (W11–W14)
        run: bun run lint:walls

      # ── TypeScript (incremental via .tsbuildinfo) ──────────────────────
      - name: Typecheck
        run: bunx tsc -p tsconfig.app.json --noEmit --incremental --tsBuildInfoFile .tsbuildinfo --pretty false

      # ── ESLint with persistent cache ───────────────────────────────────
      - name: ESLint
        run: bun run lint -- --cache --cache-location .eslintcache --cache-strategy content

      - name: Tests
        run: bun run test

      # ── PR-G7 — Tooling guardrails suite (always rerun, no cache skip) ──
      # Runs the full pr-g* regression net (timer discipline, DnD virtualization,
      # render discipline, CardTableRow memo, tooling guardrails) so any silent
      # downgrade of strict TS / ESLint / vitest isolation fails CI explicitly.
      # Kept as a dedicated step (not folded into "Tests") so the GitHub
      # checks UI shows it as its own pass/fail signal on every push & PR.
      - name: PR-G7 guardrails suite
        run: bunx vitest run pr-g4 pr-g5 pr-g6 pr-g7
