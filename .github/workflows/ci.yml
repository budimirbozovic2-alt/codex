name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  guard:
    name: Lint, domain walls & tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── Domain wall guard (W11–W14) ────────────────────────────────────
      # Fast grep-based check that mirrors the ESLint walls. Runs first so
      # boundary violations fail the build with a focused report before
      # the noisier full lint pass.
      - name: Domain walls (W11–W14)
        run: npm run lint:walls

      # ── Full ESLint (includes no-restricted-imports as ERROR) ──────────
      # `--max-warnings=0` for the wall surface specifically: any
      # no-restricted-imports violation is already error-level in
      # eslint.config.js, so the existing lint script catches them.
      - name: ESLint
        run: npm run lint

      - name: Tests
        run: npm test
