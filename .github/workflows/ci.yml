name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (saves minutes on PR rebases).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: Lint, typecheck & tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Skip Husky/Playwright/Electron post-install downloads in CI.
      HUSKY: "0"
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      # ── Bun runtime ───────────────────────────────────────────────────
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # ── ESLint + TypeScript incremental caches ─────────────────────────
      # `.eslintcache` and `.tsbuildinfo` make repeat runs 5–10x faster
      # on unchanged files. Keyed on lockfile + config so any toolchain
      # bump invalidates cleanly.
      - name: Restore lint & typecheck caches
        uses: actions/cache@v4
        with:
          path: |
            .eslintcache
            node_modules/.cache
            **/*.tsbuildinfo
          key: >-
            tooling-${{ runner.os }}-bun-${{ hashFiles('bun.lock',
            'eslint.config.js', 'tsconfig*.json') }}-${{ github.ref_name }}
          restore-keys: |
            tooling-${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'eslint.config.js', 'tsconfig*.json') }}-
            tooling-${{ runner.os }}-bun-

      # ── Bun global install cache ───────────────────────────────────────
      # Bun stores downloaded/extracted packages at ~/.bun/install/cache.
      # Layered cache strategy for maximum reuse on small lockfile drift:
      #
      #   1. Exact hit  — same bun.lock → cache restored 1:1, install is a no-op.
      #   2. Manifest tier — package.json unchanged (only transitive bumps in
      #      bun.lock); reuse extracted tarballs, refetch only the deltas.
      #   3. OS tier    — last resort, reuse whatever Bun packages exist for
      #      this runner so a cold start still avoids re-downloading the
      #      stable majority of deps (react, vite, etc.).
      #
      # On a restore-keys hit, the cache is read but NOT overwritten — the
      # new `key` only saves on cache-miss, so partial reuse is always safe.
      - name: Restore Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-lock-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-cache-${{ runner.os }}-lock-
            bun-cache-${{ runner.os }}-pkg-${{ hashFiles('package.json') }}
            bun-cache-${{ runner.os }}-pkg-
            bun-cache-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── TypeScript (incremental via .tsbuildinfo) ──────────────────────
      - name: Typecheck
        run: bunx tsc -p tsconfig.app.json --noEmit --incremental --tsBuildInfoFile .tsbuildinfo --pretty false

      # ── ESLint with persistent cache ───────────────────────────────────
      - name: ESLint
        run: bun run lint -- --cache --cache-location .eslintcache --cache-strategy content

      - name: Tests
        run: bun run test

  native:
    name: Native SQLite (Electron)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify better-sqlite3 under Electron
        run: bun run verify:native

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      HUSKY: "0"
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps

      - name: E2E tests
        run: bun run test:e2e
